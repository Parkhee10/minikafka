<svg width="680" height="520" viewBox="0 0 680 520" xmlns="http://www.w3.org/2000/svg" role="img">
<title>MiniKafka architecture diagram</title>
<desc>Producer and consumer clients connect over gRPC to a broker process. The broker contains a topic with three partitions, each backed by a write-ahead log on disk, plus a consumer group membership tracker for rebalancing.</desc>
<style>
  text { font-family: 'Segoe UI', Arial, sans-serif; }
  .th { font-size: 14px; font-weight: 600; fill: #1a1a1a; }
  .t { font-size: 14px; fill: #1a1a1a; }
  .ts { font-size: 12px; fill: #555555; }
</style>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#555555" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<rect width="680" height="520" fill="#ffffff"/>

<!-- Clients -->
<rect x="40" y="30" width="150" height="56" rx="10" fill="#FAECE7" stroke="#D85A30" stroke-width="1"/>
<text class="th" x="115" y="52" text-anchor="middle">Producer</text>
<text class="ts" x="115" y="70" text-anchor="middle">cmd/producer</text>

<rect x="490" y="30" width="150" height="56" rx="10" fill="#FAECE7" stroke="#D85A30" stroke-width="1"/>
<text class="th" x="565" y="52" text-anchor="middle">Consumer</text>
<text class="ts" x="565" y="70" text-anchor="middle">cmd/consumer</text>

<text class="ts" x="115" y="104" text-anchor="middle">gRPC / TCP</text>
<line x1="115" y1="86" x2="115" y2="140" stroke="#555555" stroke-width="1" marker-end="url(#arrow)"/>
<text class="ts" x="565" y="104" text-anchor="middle">gRPC / TCP</text>
<line x1="565" y1="86" x2="565" y2="140" stroke="#555555" stroke-width="1" marker-end="url(#arrow)"/>

<!-- Broker outer container -->
<rect x="40" y="140" width="600" height="340" rx="20" fill="#EEEDFE" stroke="#534AB7" stroke-width="1"/>
<text class="th" x="64" y="168">Broker process</text>
<text class="ts" x="64" y="186">broker/server.go</text>

<!-- Topic container -->
<rect x="64" y="200" width="552" height="180" rx="12" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
<text class="th" x="86" y="224">Topic: orders</text>

<!-- Partition 0 -->
<rect x="86" y="240" width="150" height="120" rx="10" fill="#E6F1FB" stroke="#185FA5" stroke-width="1"/>
<text class="th" x="161" y="262" text-anchor="middle">Partition 0</text>
<text class="ts" x="161" y="280" text-anchor="middle">writer goroutine</text>
<rect x="101" y="296" width="120" height="46" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="1"/>
<text class="ts" x="161" y="323" text-anchor="middle">orders-0.wal</text>

<!-- Partition 1 -->
<rect x="251" y="240" width="150" height="120" rx="10" fill="#E6F1FB" stroke="#185FA5" stroke-width="1"/>
<text class="th" x="326" y="262" text-anchor="middle">Partition 1</text>
<text class="ts" x="326" y="280" text-anchor="middle">writer goroutine</text>
<rect x="266" y="296" width="120" height="46" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="1"/>
<text class="ts" x="326" y="323" text-anchor="middle">orders-1.wal</text>

<!-- Partition 2 -->
<rect x="416" y="240" width="150" height="120" rx="10" fill="#E6F1FB" stroke="#185FA5" stroke-width="1"/>
<text class="th" x="491" y="262" text-anchor="middle">Partition 2</text>
<text class="ts" x="491" y="280" text-anchor="middle">writer goroutine</text>
<rect x="431" y="296" width="120" height="46" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="1"/>
<text class="ts" x="491" y="323" text-anchor="middle">orders-2.wal</text>

<text class="ts" x="350" y="396" text-anchor="middle">hash(key) % 3 routes each message to one partition</text>

<!-- Consumer group membership -->
<rect x="64" y="410" width="552" height="50" rx="10" fill="#FAEEDA" stroke="#854F0B" stroke-width="1"/>
<text class="th" x="340" y="430" text-anchor="middle">Group membership and offset tracking</text>
<text class="ts" x="340" y="448" text-anchor="middle">rebalances partitions across active consumers on join/leave</text>
</svg>
